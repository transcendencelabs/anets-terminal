<!DOCTYPE html>
<html>
<head>
  <title>Color Test</title>
</head>
<body>
  <div id="terminal"></div>
  
  <script src="dist/anets-terminal.js"></script>
  <script>
    const term = new AnetsTerminal.AnetsTerminal({ cols: 80, rows: 24 });
    term.open(document.getElementById('terminal'));
    
    // Debug: log the escape sequence
    const testStr = '\x1b[31mRed text\x1b[0m\r\n';
    console.log('Test string codes:', [...testStr].map(c => c.charCodeAt(0)));
    console.log('ESC code is:', testStr.charCodeAt(0), '(should be 27)');
    
    // Test 1: Basic red text -using simple color codes
    term.write('\x1b[31m');  // Set red
    term.write('Red text');
    term.write('\x1b[0m');   // Reset
    term.write('\r\n');
    
    // Test 2: Basic blue text
    term.write('\x1b[34mBlue text\x1b[0m\r\n');
    
    // Test 3: Bold yellow
    term.write('\x1b[1;33mBold Yellow\x1b[0m\r\n');
  </script>
</body>
</html>
